name: D1 Migration

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Migration SQL file path (e.g. migrations/0015_uploaded_files.sql)'
        required: true
        default: 'migrations/0015_uploaded_files.sql'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run D1 migration
        run: |
          npx wrangler d1 execute webapp-production --remote \
            --file="${{ github.event.inputs.migration_file }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
