name: Build Flutter APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64 --no-tree-shake-icons
      - name: Rename APK with version
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/RinGo-v${{ steps.version.outputs.version }}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: RinGo-v${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/RinGo-v${{ steps.version.outputs.version }}.apk
          retention-days: 30
