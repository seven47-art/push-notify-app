name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter version check
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK (arm64)
        run: flutter build apk --debug --target-platform android-arm64 --no-tree-shake-icons

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PushNotify-debug-arm64-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "PushNotify v${{ github.run_number }}"
          body: |
            ## 📱 PushNotify APK 빌드 성공!
            
            ### ✅ 구현된 기능
            - 🔔 백그라운드 알람 지원 (앱 꺼져도 알람 수신)
            - 🔊 기기 벨소리 수준으로 알람음 재생
            - 👥 채널 운영자 + 모든 구독자 알람 발송
            - ▶️ 알람 수락 시 메시지 소스 즉시 실행 (YouTube/오디오/비디오)
            
            ### 📥 설치 방법
            1. 아래 **Assets** 에서 `app-debug.apk` 다운로드
            2. 안드로이드: **설정 > 보안 > 알 수 없는 앱 설치** 허용
            3. APK 파일 탭하여 설치
            
            ### ⚙️ 지원 기기
            - Android 5.0 (API 21) 이상
            - arm64-v8a (대부분의 최신 안드로이드)
          files: |
            build/app/outputs/flutter-apk/app-debug.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
