name: Build Flutter APK
on:
  push:
    branches: [ main, master ]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto increment version & get version
        id: version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION=$(echo $CURRENT | sed 's/+.*//')
          BUILD=$(echo $CURRENT | sed 's/.*+//')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_BUILD=$((BUILD + 1))
          NEW_FULL="${NEW_VERSION}+${NEW_BUILD}"
          sed -i "s/^version: .*/version: ${NEW_FULL}/" pubspec.yaml
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$NEW_FULL" >> $GITHUB_OUTPUT
          echo "✅ Version: $CURRENT → $NEW_FULL"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: version bump → ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64 --no-tree-shake-icons

      - name: Verify 16KB page alignment (.so files)
        run: |
          APK="build/app/outputs/flutter-apk/app-debug.apk"
          echo "── .so files in APK ──"
          unzip -l "$APK" | grep '\.so$' || echo "No .so files found"
          echo ""
          echo "── ELF LOAD segment alignment check ──"
          TMPDIR=$(mktemp -d)
          unzip -o "$APK" "lib/arm64-v8a/*.so" -d "$TMPDIR" 2>/dev/null || true
          FAIL=0
          for so in "$TMPDIR"/lib/arm64-v8a/*.so; do
            [ -f "$so" ] || continue
            NAME=$(basename "$so")
            ALIGN=$(readelf -l "$so" 2>/dev/null | grep -E "LOAD.*0x" | head -1 | awk '{print $NF}')
            if echo "$ALIGN" | grep -qE "0x4000|0x10000"; then
              echo "✅ $NAME  align=$ALIGN (16KB OK)"
            else
              echo "⚠️  $NAME  align=$ALIGN (may need 16KB alignment)"
              FAIL=1
            fi
          done
          rm -rf "$TMPDIR"
          if [ "$FAIL" = "1" ]; then
            echo "::warning::Some .so files may not be 16KB aligned. Verify before Play Store upload."
          fi


      - name: Rename APK with version
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/RinGo-v${{ steps.version.outputs.version }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: RinGo-v${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/RinGo-v${{ steps.version.outputs.version }}.apk
          retention-days: 30
