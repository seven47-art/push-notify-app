name: Build Flutter APK
on:
  push:
    branches: [ main, master ]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto increment versionCode & get version
        id: version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION=$(echo $CURRENT | sed 's/+.*//')
          BUILD=$(echo $CURRENT | sed 's/.*+//')
          NEW_BUILD=$((BUILD + 1))
          NEW_VERSION="${VERSION}+${NEW_BUILD}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$NEW_BUILD" >> $GITHUB_OUTPUT
          echo "full_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "✅ Version: $CURRENT → $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: versionCode bump → ${{ steps.version.outputs.full_version }} [skip ci]"
          git push

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64 --no-tree-shake-icons

      - name: Rename APK with version
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/RinGo-v${{ steps.version.outputs.version }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: RinGo-v${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/RinGo-v${{ steps.version.outputs.version }}.apk
          retention-days: 30
