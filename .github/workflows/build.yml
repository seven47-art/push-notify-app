name: Build Flutter APK
on:
  push:
    branches: [ main, master ]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto increment version & get version
        id: version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION=$(echo $CURRENT | sed 's/+.*//')
          BUILD=$(echo $CURRENT | sed 's/.*+//')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_BUILD=$((BUILD + 1))
          NEW_FULL="${NEW_VERSION}+${NEW_BUILD}"
          sed -i "s/^version: .*/version: ${NEW_FULL}/" pubspec.yaml
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$NEW_FULL" >> $GITHUB_OUTPUT
          echo "✅ Version: $CURRENT → $NEW_FULL"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: version bump → ${{ steps.version.outputs.version }} [skip ci]"
          git push
      # ── Release 서명용 Keystore 복원 ──
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/ringo-release.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=ringo-release.jks" >> android/key.properties

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      # ── Debug APK ──
      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64 --no-tree-shake-icons

      # ── Release APK ──
      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons

      # ── Release AAB (Play Store용) ──
      - name: Build release AAB
        run: flutter build appbundle --release --target-platform android-arm64 --no-tree-shake-icons

      # ── 16KB alignment 검증 (release APK 기준) ──
      - name: Verify 16KB page alignment (.so files)
        run: |
          APK="build/app/outputs/flutter-apk/app-release.apk"
          echo "── .so files in APK ──"
          unzip -l "$APK" | grep '\.so$' || echo "No .so files found"
          echo ""
          echo "── ELF LOAD segment alignment check ──"
          TMPDIR=$(mktemp -d)
          unzip -o "$APK" "lib/arm64-v8a/*.so" -d "$TMPDIR" 2>/dev/null || true
          FAIL=0
          for so in "$TMPDIR"/lib/arm64-v8a/*.so; do
            [ -f "$so" ] || continue
            NAME=$(basename "$so")
            ALIGN=$(readelf -l "$so" 2>/dev/null | grep -m1 "LOAD" | awk '{for(i=1;i<=NF;i++) if($i ~ /^0x/) last=$i; print last}')
            if [ -z "$ALIGN" ]; then
              echo "⚠️  $NAME  align=UNKNOWN (could not parse ELF)"
              FAIL=1
            elif echo "$ALIGN" | grep -qE "0x4000|0x10000"; then
              echo "✅ $NAME  align=$ALIGN (16KB OK)"
            else
              echo "⚠️  $NAME  align=$ALIGN (may need 16KB alignment)"
              FAIL=1
            fi
          done
          rm -rf "$TMPDIR"
          if [ "$$FAIL" = "1" ]; then
            echo "::warning::Some .so files may not be 16KB aligned. Verify before Play Store upload."
          fi

      # ── Artifact 업로드 ──
      - name: Rename APK with version
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/RinGo-v${{ steps.version.outputs.version }}-debug.apk
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/RinGo-v${{ steps.version.outputs.version }}-release.apk
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/RinGo-v${{ steps.version.outputs.version }}.aab

      - uses: actions/upload-artifact@v4
        with:
          name: RinGo-v${{ steps.version.outputs.version }}
          path: |
            build/app/outputs/flutter-apk/RinGo-v${{ steps.version.outputs.version }}-debug.apk
            build/app/outputs/flutter-apk/RinGo-v${{ steps.version.outputs.version }}-release.apk
            build/app/outputs/bundle/release/RinGo-v${{ steps.version.outputs.version }}.aab
          retention-days: 30
