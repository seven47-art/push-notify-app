name: push_notify_app
description: "Push Notification Subscriber App - 폐쇄형 채널 구독 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP 요청
  http: ^1.2.0
  
  # 로컬 저장소
  shared_preferences: ^2.3.0
  
  # URL 런처 (딥링크 처리)
  url_launcher: ^6.3.0
  
  # 이미지 선택 (갤러리/카메라)
  image_picker: ^1.1.2
  
  # 아이콘
  cupertino_icons: ^1.0.8

  # WebView
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
