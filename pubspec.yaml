name: push_notify_app
description: "Push Notification Subscriber App - 폐쇄형 채널 구독 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  file_picker: ^8.1.2
  android_intent_plus: ^5.0.3
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.1.0
  workmanager: ^0.5.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
