name: push_notify_app
description: "Push Notification Subscriber App - 폐쇄형 채널 구독 앱"
publish_to: 'none'



version: 3.7.127+176


environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  http: ^1.2.0
  http_parser: ^4.0.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.8
  file_picker: ^8.1.2
  android_intent_plus: ^5.0.3
  path_provider: ^2.1.0
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.0
  video_compress: ^3.1.4
  reorderable_grid_view: ^2.2.8
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
