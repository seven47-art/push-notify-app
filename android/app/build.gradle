plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.pushnotify.push_notify_app"
    compileSdk = 35
    ndkVersion = flutter.ndkVersion
    signingConfigs {
        release {
            keyAlias = keystoreProperties['keyAlias']
            keyPassword = keystoreProperties['keyPassword']
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword']
        }
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.pushnotify.push_notify_app"
        minSdkVersion = flutter.minSdkVersion          // Android 5.0+ (전체 기기 99% 호환)
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        // arm64 단일 아키텍처로 APK 크기 절감
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    buildTypes {
        debug {
            // 디버그 키로 서명 (설치 가능)
            signingConfig = signingConfigs.debug
            debuggable true
            applicationIdSuffix ""
        }
        release {
            signingConfig = signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    // AndroidX Core (WindowCompat, WindowInsetsCompat 등)
    implementation("androidx.core:core-ktx:1.13.1")
    // HTTP 클라이언트 (AlarmPollingService 백그라운드 폴링)
    implementation("com.squareup.okhttp3:okhttp:4.12.0")
    // Kotlin Coroutines (비동기 폴링)
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")
    // Firebase BOM (버전 통합 관리)
    implementation(platform("com.google.firebase:firebase-bom:33.7.0"))
    // FCM (Firebase Cloud Messaging)
    implementation("com.google.firebase:firebase-messaging-ktx")

}
