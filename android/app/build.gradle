plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.pushnotify.push_notify_app"
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.pushnotify.push_notify_app"
        minSdk = 21          // Android 5.0+ (전체 기기 99% 호환)
        targetSdk = 34
        versionCode = 1
        versionName = "1.0.0"
        // arm64 단일 아키텍처로 APK 크기 절감
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    buildTypes {
        debug {
            // 디버그 키로 서명 (설치 가능)
            signingConfig = signingConfigs.debug
            debuggable true
            applicationIdSuffix ""
        }
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}
